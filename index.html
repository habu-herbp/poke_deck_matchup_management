<style>
:root{--bg:#050914;--bg2:#08111f;--line:rgba(148,163,184,.2);--txt:#e5edf7;--mut:#94a3b8;--b:#38bdf8;--g:#22c55e;--r:#ef4444;--y:#f59e0b;--sh:0 18px 55px rgba(0,0,0,.42);--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{background:var(--bg)}body{margin:0;min-height:100vh;color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(37,99,235,.25),transparent 30%),linear-gradient(180deg,var(--bg2),var(--bg) 55%,#030712);overflow-x:hidden}button,select,input,textarea{font:inherit}button{cursor:pointer;border:0}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:rgba(2,6,23,.58);color:var(--txt);outline:none}select,input{min-height:44px;padding:10px 12px}textarea{min-height:92px;padding:10px 12px;resize:vertical;line-height:1.55}button:focus-visible,select:focus,input:focus,textarea:focus{outline:2px solid rgba(56,189,248,.72);outline-offset:2px}.shell{width:min(100%,980px);margin:0 auto;padding-bottom:calc(24px + var(--sb))}.header{position:sticky;top:0;z-index:50;padding:calc(10px + var(--st)) 12px 10px;background:rgba(5,9,20,.84);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}.hcard{border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(15,26,45,.97),rgba(9,17,31,.95));box-shadow:var(--sh);overflow:hidden}.htop{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:14px}.brandrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.brand h1{margin:0;font-size:1.48rem}.brand p{margin:5px 0 0;color:var(--mut);font-size:.84rem}.badge{display:inline-flex;gap:6px;align-items:center;padding:5px 9px;border-radius:999px;background:rgba(56,189,248,.14);border:1px solid rgba(56,189,248,.28);font-size:.76rem;font-weight:800;color:#bfdbfe}.badge.db{background:rgba(34,197, t{display:grid;gap:12px}.fieldset{display:grid;gap:10px;padding:12px;border:1px solid rgba(148,163,184,.14);border-radius:16px;background:rgba(2,6,23,.28)}.muted{color:var(--mut)!important}.small{font-size:.78rem!important}.drop{display:grid;place-items:center;min-height:120px;padding:16px;border:2px dashed rgba(56,189,248,.38);border-radius:16px;background:rgba(56,189,248,.08);text-align:center;color:#bfdbfe}.drop.drag{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.55)}.imagegrid{display:grid;grid-template-columns:1fr;gap:12px}.imgcard{overflow:hidden;border:1px solid rgba(148,163,184,.18);border-radius:16px;background:rgba(2,6,23,.34);cursor:pointer}.thumb{width:100%;height:165px;object-fit:cover;background:#020617;display:block}.imginfo{padding:12px;display:grid;gap:8px}.imgtitle{font-weight:850}.imgmeta{font-size:.78rem;color:var(--mut)}.modalback{position:fixed;inset:0;z-index:220;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:16px}.modalback.open{display:flex}.modal{width:min(100%,900px);max-height:92vh;overflow:auto;border:1px solid rgba(148,163,184,.26);border-radius:22px;background:linear-gradient(180deg,rgba(15,26,45,.98),rgba(3,7,18,.98));box-shadow:var(--sh)}.mhead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,26,45,.96)}.mhead h3{margin:0}.mbody{display:grid;gap:14px;padding:14px}.preview{width:100%;max-height:58vh;object-fit:contain;border-radius:16px;background:#020617;border:1px solid rgba(148,163,184,.15)}.overlay{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.56);opacity:0;pointer-events:none}.overlay.open{opacity:1;pointer-events:auto}.drawer{position:fixed;top:0;left:0;z-index:100;width:min(90vw,380px);height:100vh;padding:calc(14px + var(--st)) 14px calc(14px + var(--sb));background:linear-gradient(180deg,rgba(15,26,45,.98),rgba(3,7,18,.98));border-right:1px solid var(--line);box-shadow:24px 0 60px rgba(0,0,0,.48);transform:translateX(-105%);transition:transform .18s ease;display:flex;flex-direction:column;gap:12px;overflow:auto}.drawer.open{transform:translateX(0)}.dhead{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:10px}.dhead h2{margin:0;font-size:1.05rem}.ditem{width:100%;padding:10px 12px;border-radius:14px;text-align:left;color:var(--txt);background:rgba(148,163,184,.08);border:1px solid var(--line);display:grid;gap:3px}.ditem.active{background:rgba(56,189,248,.16);border-color:rgba(96,165,250,.55)}.toast{position:fixed;left:50%;bottom:calc(16px + var(--sb));transform:translateX(-50%) translateY(16px);z-index:250;width:min(calc(100% - 24px),520px);padding:12px 14px;border-radius:16px;background:rgba(15,23,42,.97);border:1px solid rgba(96,165,250,.42);box-shadow:var(--sh);opacity:0;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%)}@media(min-width:640px){.grid3{grid-template-columns:repeat(3,1fr)}.controls{grid-template-columns:repeat(5,auto);justify-content:start}.meta{grid-template-columns:repeat(2,1fr)}.formgrid{grid-template-columns:repeat(2,1fr)}.mgmt{grid-template-columns:1fr 1fr}.imagegrid{grid-template-columns:repeat(2,1fr)}.main{padding-left:16px;padding-right:16px}.tabswrap{margin-left:-16px;margin-right:-16px;padding-left:16px;padding-right:16px}.wide{grid-column:1/-1}}@media(min-width:900px){.imagegrid{grid-template-columns:repeat(3,1fr)}}

<body>
<div class="shell"><header class="header" id="header"><div class="hcard"><div class="htop"><div class="brand"><div class="brandrow"><h1>MatchScope</h1><span class="badge mode"><span class="dot"></span><span id="modeLabel">閲覧モード</span></span><span class="badge db"><span class="dot"></span><span id="dbLabel">DB準備中</span></span></div><p>デッキ戦略ノート</p></div><div class="ha"><button class="icon" id="infoBtn">i</button><button class="icon primary" id="headerBtn">▴</button></div></div><div class="hbody"><section class="deckpanel" id="deckPanel"><div class="grid3"><div class="field"><label>デッキ選択</label><select id="deckSelect" disabled></select></div><div class="field"><label>対面選択</label><select id="matchupSelect" disabled></select></div><div class="field"><label>Quick View</label><select id="quickSelect"><option value="common">共通</option><option value="first">先攻時</option><option value="second">後攻時</option></select></div></div></section><div class="controls"><button class="btn success" id="modeBtn">編集モードへ</button><button class="btn primary" id="drawerBtn">ナビゲーション</button><button class="btn" id="deckPanelBtn">デッキ選択を最小化</button><button class="btn" id="headerBtn2">ヘッダーを最小化</button><button class="btn warning" id="saveBtn">表示データを保存</button></div></div></div></header><main class="main"><nav class="tabswrap"><div class="tabs" id="tabs"></div></nav><section class="content"><div class="chead"><h2 id="title">プラン</h2><p id="note">Quick Viewと画像を表示します。</p></div><div class="body" id="body"></div></section></main></div>
<div class="overlay" id="overlay" hidden></div><aside class="drawer" id="drawer"><div class="dhead"><h2>ナビゲーション</h2><button class="icon" id="closeDrawer">×</button></div><div id="drawerContent"></div></aside><div class="toast" id="toast"></div>
<div class="modalback" id="imageModal" aria-hidden="true"><div class="modal"><div class="mhead"><h3 id="modalTitle">画像詳細</h3><button class="icon" id="modalClose">×</button></div><div class="mbody" id="modalBody"></div></div></div>
<div class="modalback" id="infoModal" aria-hidden="true"><div class="modal"><div class="mhead"><h3>MatchScope 情報</h3><button class="icon" id="infoClose">×</button></div><div class="mbody" id="infoBody"></div></div></div>
<input id="jsonImportInput" type="file" accept="application/json,.json" hidden>
<script>
'use strict';
const DB_NAME='MatchScopeDB_Final',DB_VERSION=1,STORE_DECKS='decks',STORE_MATCHUPS='matchups',STORE_SETTINGS='settings';
const DEFAULT_TURNS=['先攻1','後攻1','2ターン目','3ターン目','中盤','終盤','その他'];
const PLAN_KEYS=['common','first','second'],PLAN_LABELS={common:'共通',first:'先攻時',second:'後攻時'};
const Tabs=[{id:'plan',label:'プラン',note:'Quick Viewと共通・先攻時・後攻時のプランを表示/編集します。'},{id:'precheck',label:'試合前確認',note:'着席前に30秒で見るチェックリストを表示/編集します。'},{id:'ng',label:'NG / 注意',note:'やりがちなミス、負け筋を表示/編集します。'},{id:'review',label:'振り返り',note:'振り返りメモと勝敗記録を表示/編集します。'},{id:'matchupImage',label:'対面画像',note:'対面ごとの画像をターン分類別に表示/編集します。'},{id:'referenceImage',label:'参考画像',note:'デッキ単位の参考画像を表示/編集します。'},{id:'category',label:'分類設定',note:'ターン分類、デッキ、対面を管理します。'}];
const S={tab:'plan',edit:false,headerMin:false,deckMin:false,drawer:false,db:null,decks:[],allMatchups:[],matchups:[],settings:{id:'app',turnCategories:DEFAULT_TURNS.slice()},deckId:'',matchupId:'',deck:null,matchup:null,turn:'先攻1',modal:{kind:'',id:''},search:''};
const E={};
function el(id){return document.getElementById(id)}function cache(){['header','deckPanel','deckSelect','matchupSelect','quickSelect','tabs','body','title','note','modeLabel','dbLabel','modeBtn','drawerBtn','closeDrawer','overlay','drawer','drawerContent','deckPanelBtn','headerBtn','headerBtn2','saveBtn','infoBtn','toast','imageModal','modalClose','modalBody','modalTitle','infoModal','infoClose','infoBody','jsonImportInput'].forEach(id=>E[id]=el(id))}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function nid(p){return p+'_'+(crypto.randomUUID?crypto.randomUUID():Date.now()+'_'+Math.random().toString(16).slice(2))}function now(){return new Date().toISOString()}
function emptyPlan(seed){return{idealBoard:seed?'対面：'+seed+'。理想盤面を整理する。':'理想盤面を整理する。',actionPolicy:'行動方針を整理する。',prizePlan:'サイドプランを整理する。',priority:'最優先ポイントを整理する。',avoid:'避けたいことを整理する。'}}function emptyPlans(seed){return{common:emptyPlan(seed),first:emptyPlan('先攻時 '+seed),second:emptyPlan('後攻時 '+seed)}}function normPlans(plans,seed){const b=emptyPlans(seed||''),s=plans||{};PLAN_KEYS.forEach(k=>{b[k]=Object.assign(b[k],s[k]||{})});return b}
function normImages(images,withTurn){if(!Array.isArray(images))return[];return images.map(x=>typeof x==='string'?{id:nid('img'),dataUrl:x,fileName:'image',title:'image',turn:withTurn?'その他':'',memo:'',tags:[],type:'image/*',createdAt:now(),updatedAt:now()}:Object.assign({id:nid('img'),dataUrl:'',fileName:'image',title:'',turn:withTurn?'その他':'',memo:'',tags:[],type:'image/*',createdAt:now(),updatedAt:now()},x)).filter(x=>x.dataUrl)}
function deckObj(name,tags){const t=now();return{id:nid('deck'),name:name.trim(),tags:tags||[],referenceImages:[],createdAt:t,updatedAt:t}}function matchupObj(deckId,name,imp){const t=now();return{id:nid('matchup'),deckId,name:name.trim(),importance:imp||'中',wins:0,losses:0,plans:emptyPlans(name),preCheck:'着席前に確認すること、最初に意識することを記録する。',cautions:'やりがちなミス、出しすぎ、リソース切れ、負け筋を記録する。',review:'試合後の気づき、勝因、敗因、次回改善点を記録する。',images:[],createdAt:t,updatedAt:t}}
function openDb(){return new Promise((res,rej)=>{if(!indexedDB){rej(new Error('IndexedDBが利用できません。'));return}const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_DECKS))db.createObjectStore(STORE_DECKS,{keyPath:'id'});if(!db.objectStoreNames.contains(STORE_SETTINGS))db.createObjectStore(STORE_SETTINGS,{keyPath:'id'});if(!db.objectStoreNames.contains(STORE_MATCHUPS)){const s=db.createObjectStore(STORE_MATCHUPS,{keyPath:'id'});s.createIndex('deckId','deckId',{unique:false})}};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)})}
function req(r){return new Promise((res,rej)=>{r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)})}function done(tx){return new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);tx.onabort=e=>rej(e.target.error)})}function store(n,m){const tx=S.db.transaction(n,m);return{tx,store:tx.objectStore(n)}}async function all(n){const c=store(n,'readonly');return await req(c.store.getAll())}async function put(n,o){const c=store(n,'readwrite');c.store.put(o);await done(c.tx);return o}async function get(n,k){const c=store(n,'readonly');return await req(c.store.get(k))}async function del(n,k){const c=store(n,'readwrite');c.store.delete(k);await done(c.tx)}async function clearStore(n){const c=store(n,'readwrite');c.store.clear();await done(c.tx)}async function upd(n,k,fn){const c=store(n,'readwrite');const cur=await req(c.store.get(k));if(!cur)throw new Error('更新対象が見つかりません');const u=fn(JSON.parse(JSON.stringify(cur)));u.updatedAt=now();c.store.put(u);await done(c.tx);return u}
async function byDeck(deckId){const tx=S.db.transaction(STORE_MATCHUPS,'readonly');const r=await req(tx.objectStore(STORE_MATCHUPS).index('deckId').getAll(deckId));return r.sort((a,b)=>String(a.name).localeCompare(String(b.name),'ja'))}async function deleteDeckCascade(deckId){const tx=S.db.transaction([STORE_DECKS,STORE_MATCHUPS],'readwrite');tx.objectStore(STORE_DECKS).delete(deckId);const r=tx.objectStore(STORE_MATCHUPS).index('deckId').openCursor(IDBKeyRange.only(deckId));r.onsuccess=e=>{const c=e.target.result;if(c){c.delete();c.continue()}};await done(tx)}
async function seed(){if(!(await get(STORE_SETTINGS,'app')))await put(STORE_SETTINGS,{id:'app',turnCategories:DEFAULT_TURNS.slice(),createdAt:now(),updatedAt:now()});if((await all(STORE_DECKS)).length)return;const d1=deckObj('ドラパルトex',['環境','メイン候補']),d2=deckObj('サーナイトex',['環境','要練習']);const ms=[matchupObj(d1.id,'vs ロスト','高'),matchupObj(d1.id,'vs 悪リザ','高'),matchupObj(d1.id,'vs ミライドン','中'),matchupObj(d2.id,'vs ロスト','高')];const tx=S.db.transaction([STORE_DECKS,STORE_MATCHUPS],'readwrite'),ds=tx.objectStore(STORE_DECKS),msS=tx.objectStore(STORE_MATCHUPS);ds.put(d1);ds.put(d2);ms.forEach(m=>msS.put(m));await done(tx)}
async function load(){S.settings=(await get(STORE_SETTINGS,'app'))||{id:'app',turnCategories:DEFAULT_TURNS.slice()};S.decks=(await all(STORE_DECKS)).sort((a,b)=>String(a.name).localeCompare(String(b.name),'ja'));S.allMatchups=await all(STORE_MATCHUPS);if(!S.decks.some(d=>d.id===S.deckId))S.deckId=S.decks[0]?.id||'';S.deck=S.decks.find(d=>d.id===S.deckId)||null;S.matchups=S.deckId?await byDeck(S.deckId):[];if(!S.matchups.some(m=>m.id===S.matchupId))S.matchupId=S.matchups[0]?.id||'';S.matchup=S.matchups.find(m=>m.id===S.matchupId)||null;if(S.deck)S.deck.referenceImages=normImages(S.deck.referenceImages,false);if(S.matchup){S.matchup.plans=normPlans(S.matchup.plans,S.matchup.name);S.matchup.images=normImages(S.matchup.images,true)}renderSelects();renderTabs();render();renderDrawer()}
function usedTurns(){const set=new Set(S.settings.turnCategories||DEFAULT_TURNS);S.allMatchups.forEach(m=>normImages(m.images,true).forEach(i=>i.turn&&set.add(i.turn)));return Array.from(set)}
function renderSelects(){E.deckSelect.innerHTML='';S.decks.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=d.name;o.selected=d.id===S.deckId;E.deckSelect.appendChild(o)});if(!S.decks.length){const o=document.createElement('option');o.textContent='デッキなし';E.deckSelect.appendChild(o)}E.deckSelect.disabled=!S.decks.length;E.matchupSelect.innerHTML='';S.matchups.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name;o.selected=m.id===S.matchupId;E.matchupSelect.appendChild(o)});if(!S.matchups.length){const o=document.createElement('option');o.textContent='対面なし';E.matchupSelect.appendChild(o)}E.matchupSelect.disabled=!S.matchups.length}
function rate(m){if(!m)return'未記録';const w=Number(m.wins||0),l=Number(m.losses||0),t=w+l;return t?((w/t)*100).toFixed(1)+'%':'未記録'}function rec(m){return m?Number(m.wins||0)+'勝 '+Number(m.losses||0)+'敗':'未記録'}function meta(k,v){return'<div class="mi"><span class="mk">'+escapeHtml(k)+'</span><span class="mv">'+escapeHtml(v)+'</span></div>'}function prow(k,v){return'<div class="prow"><div class="pl">'+escapeHtml(k)+'</div><div class="pt">'+escapeHtml(v||'')+'</div></div>'}

function bindDynamic(){const on=(id,fn)=>{const x=el(id);if(x)x.onclick=fn};on('addDeck',addDeck);on('delDeck',delDeck);on('addTag',addTag);on('saveCategoriesBtn',saveCategories);document.querySelectorAll('.tagDel').forEach(b=>b.onclick=()=>delTag(b.dataset.tag));on('addMatch',addMatch);on('delMatch',delMatch);on('saveImp',saveImp);on('winBtn',()=>result('win'));on('lossBtn',()=>result('loss'));on('resetBtn',resetResult);document.querySelectorAll('.turn').forEach(b=>b.onclick=()=>{S.turn=b.dataset.turn;render()});document.querySelectorAll('.imgcard').forEach(c=>c.onclick=()=>openImageModal(c.dataset.kind,c.dataset.imgid));bindFileArea('matchupFileInput','matchupDrop','matchup');bindFileArea('refFileInput','refDrop','reference')}

async function addDeck(){const name=el('newDeck')?.value.trim();if(!name)return toast('デッキ名を入力してください。');const d=await put(STORE_DECKS,deckObj(name,[]));S.deckId=d.id;S.matchupId='';await load();toast('デッキを追加しました。')}async function delDeck(){if(!S.deck)return;if(!confirm('デッキ「'+S.deck.name+'」を削除します。紐づく対面も削除されます。よろしいですか？'))return;await deleteDeckCascade(S.deck.id);S.deckId='';S.matchupId='';await load();toast('デッキを削除しました。')}async function addTag(){const tag=el('newTag')?.value.trim();if(!S.deck||!tag)return toast('タグを入力してください。');await upd(STORE_DECKS,S.deck.id,r=>{r.tags=Array.isArray(r.tags)?r.tags:[];if(!r.tags.includes(tag))r.tags.push(tag);return r});await load();toast('タグを追加しました。')}async function delTag(tag){await upd(STORE_DECKS,S.deck.id,r=>{r.tags=(r.tags||[]).filter(x=>x!==tag);return r});await load();toast('タグを削除しました。')}async function addMatch(){const name=el('newMatch')?.value.trim(),imp=el('newImp')?.value||'中';if(!S.deck)return toast('先にデッキを追加してください。');if(!name)return toast('対面名を入力してください。');const m=await put(STORE_MATCHUPS,matchupObj(S.deck.id,name,imp));S.matchupId=m.id;await load();toast('対面を追加しました。')}async function delMatch(){if(!S.matchup)return;if(!confirm('対面「'+S.matchup.name+'」を削除します。よろしいですか？'))return;await del(STORE_MATCHUPS,S.matchup.id);S.matchupId='';await load();toast('対面を削除しました。')}async function saveImp(){if(!S.matchup)return;await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.importance=el('editImp')?.value||'中';return r});await load();toast('重要度を保存しました。')}async function result(type){if(!S.matchup)return;await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.wins=Number(r.wins||0);r.losses=Number(r.losses||0);if(type==='win')r.wins++;else r.losses++;return r});await load();toast(type==='win'?'勝ちを+1しました。':'負けを+1しました。')}async function resetResult(){if(!S.matchup)return;if(!confirm('対面「'+S.matchup.name+'」の勝敗記録をリセットします。よろしいですか？'))return;await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.wins=0;r.losses=0;return r});await load();toast('勝敗をリセットしました。')}async function saveCategories(){const lines=(el('turnCategoryText')?.value||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);const uniq=[...new Set(lines.length?lines:DEFAULT_TURNS)];await put(STORE_SETTINGS,{id:'app',turnCategories:uniq,updatedAt:now()});S.settings.turnCategories=uniq;await load();toast('分類を保存しました。')}
function fileToDataUrl(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=()=>rej(fr.error);fr.readAsDataURL(file)})}async function addFiles(files,kind){const list=Array.from(files||[]).filter(f=>String(f.type||'').startsWith('image/'));if(!list.length)return toast('画像ファイルを選択してください。');if(kind==='matchup'&&!S.matchup)return toast('先に対面を選択してください。');if(kind==='reference'&&!S.deck)return toast('先にデッキを選択してください。');const commonTitle=el('refCommonTitle')?.value.trim()||'';const turn=el('uploadTurn')?.value||S.turn;const added=[];for(const f of list){const dataUrl=await fileToDataUrl(f);added.push({id:nid('img'),dataUrl,fileName:f.name,title:commonTitle?commonTitle+(list.length>1?' - '+f.name:''):f.name,turn:kind==='matchup'?turn:'',memo:'',tags:[],type:f.type||'image/*',createdAt:now(),updatedAt:now()})}if(kind==='matchup'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.images=normImages(r.images,true).concat(added);return r});S.turn=turn}else{await upd(STORE_DECKS,S.deck.id,r=>{r.referenceImages=normImages(r.referenceImages,false).concat(added);return r})}await load();toast(added.length+'件の画像を追加しました。')}
function imagesOf(kind){return kind==='matchup'?normImages(S.matchup?.images,true):normImages(S.deck?.referenceImages,false)}function findImage(kind,imgId){return imagesOf(kind).find(i=>i.id===imgId)}function openImageModal(kind,imgId){const img=findImage(kind,imgId);if(!img)return;S.modal={kind,id:imgId};E.imageModal.classList.add('open');E.imageModal.setAttribute('aria-hidden','false');renderModal(img,kind)}function closeImageModal(){S.modal={kind:'',id:''};E.imageModal.classList.remove('open');E.imageModal.setAttribute('aria-hidden','true');E.modalBody.innerHTML=''}
function renderModal(img,kind){const isRef=kind==='reference';E.modalTitle.textContent=img.title||img.fileName||'画像詳細';const tagHtml=(img.tags||[]).map(t=>'<span class="chip">'+escapeHtml(t)+(S.edit?'<button class="chipx imgTagDel" data-tag="'+escapeHtml(t)+'">×</button>':'')+'</span>').join('')||'<span class="muted small">タグなし</span>';let h='<img class="preview" src="'+escapeHtml(img.dataUrl)+'" alt="'+escapeHtml(img.title||img.fileName||'image')+'"><div class="box"><div class="meta">'+meta('タイトル',img.title||'')+meta('ファイル名',img.fileName||'')+(isRef?meta('画像種別','デッキ参考画像'):meta('ターン分類',img.turn||'その他'))+meta('種類',img.type||'image/*')+'</div><h4 style="margin-top:12px">メモ</h4><p>'+escapeHtml(img.memo||'未入力です。')+'</p><h4 style="margin-top:12px">タグ一覧</h4><div class="chips">'+tagHtml+'</div><div class="row"><button class="btn primary" id="downloadImageBtn">画像保存</button><button class="btn" id="modalClose2">閉じる</button></div></div>';if(S.edit)h+='<div class="box editonly" style="display:block"><h3>画像編集</h3><div class="formgrid">'+input('タイトル編集','modalEditTitle',img.title||'')+(isRef?'':select('ターン分類変更','modalEditTurn',img.turn||'その他',usedTurns()))+'</div>'+textarea('メモ編集','modalEditMemo',img.memo||'')+'<div class="field"><label>タグ入力（Enterで追加）</label><input id="modalTagInput" placeholder="タグを入力してEnter"></div><div class="row"><button class="btn warning" id="saveImageMetaBtn">画像情報を保存</button><button class="btn danger" id="deleteImageBtn">削除</button></div></div>';E.modalBody.innerHTML=h;el('modalClose2').onclick=closeImageModal;el('downloadImageBtn').onclick=()=>downloadImage(img);if(S.edit){el('saveImageMetaBtn').onclick=saveImageMeta;el('deleteImageBtn').onclick=deleteCurrentImage;el('modalTagInput').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addImageTag(e.target.value);e.target.value=''}};document.querySelectorAll('.imgTagDel').forEach(b=>b.onclick=()=>deleteImageTag(b.dataset.tag))}}
function downloadImage(img){const a=document.createElement('a');a.href=img.dataUrl;a.download=img.fileName||'matchscope-image';document.body.appendChild(a);a.click();a.remove()}async function updateImage(kind,imgId,mapper){if(kind==='matchup'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.images=normImages(r.images,true).map(i=>i.id===imgId?mapper(i):i);return r})}else{await upd(STORE_DECKS,S.deck.id,r=>{r.referenceImages=normImages(r.referenceImages,false).map(i=>i.id===imgId?mapper(i):i);return r})}}async function saveImageMeta(){const {kind,id:imgId}=S.modal;if(!imgId)return;await updateImage(kind,imgId,i=>Object.assign(i,{title:el('modalEditTitle')?.value||i.fileName,turn:kind==='matchup'?(el('modalEditTurn')?.value||i.turn):'',memo:el('modalEditMemo')?.value||'',updatedAt:now()}));await load();const img=findImage(kind,imgId);if(img)renderModal(img,kind);toast('画像情報を保存しました。')}async function addImageTag(raw){const tag=String(raw||'').trim(),{kind,id:imgId}=S.modal;if(!tag||!imgId)return;await updateImage(kind,imgId,i=>{i.tags=Array.isArray(i.tags)?i.tags:[];if(!i.tags.includes(tag))i.tags.push(tag);i.updatedAt=now();return i});await load();const img=findImage(kind,imgId);if(img)renderModal(img,kind);toast('タグを追加しました。')}async function deleteImageTag(tag){const {kind,id:imgId}=S.modal;if(!imgId)return;await updateImage(kind,imgId,i=>{i.tags=(i.tags||[]).filter(t=>t!==tag);i.updatedAt=now();return i});await load();const img=findImage(kind,imgId);if(img)renderModal(img,kind);toast('タグを削除しました。')}async function deleteCurrentImage(){const {kind,id:imgId}=S.modal,img=findImage(kind,imgId);if(!img)return;if(!confirm('画像「'+(img.title||img.fileName||'無題')+'」を削除します。よろしいですか？'))return;if(kind==='matchup'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.images=normImages(r.images,true).filter(i=>i.id!==imgId);return r})}else{await upd(STORE_DECKS,S.deck.id,r=>{r.referenceImages=normImages(r.referenceImages,false).filter(i=>i.id!==imgId);return r})}closeImageModal();await load();toast('画像を削除しました。')}
async function saveCurrent(){if(!S.matchup)return toast('保存対象の対面がありません。');if(S.tab==='plan'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.plans=normPlans(r.plans,r.name);PLAN_KEYS.forEach(k=>['idealBoard','actionPolicy','prizePlan','priority','avoid'].forEach(f=>{const x=el('plan_'+k+'_'+f);if(x)r.plans[k][f]=x.value}));return r})}else if(S.tab==='precheck'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.preCheck=el('editSingle')?.value??r.preCheck;return r})}else if(S.tab==='ng'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.cautions=el('editSingle')?.value??r.cautions;return r})}else if(S.tab==='review'){await upd(STORE_MATCHUPS,S.matchup.id,r=>{r.review=el('editSingle')?.value??r.review;return r})}else{return toast('このタブは専用ボタンで保存してください。')}await load();toast('IndexedDBへ保存しました。')}
async function exportJson(){const data={version:1,exportedAt:now(),decks:await all(STORE_DECKS),matchups:await all(STORE_MATCHUPS),settings:await all(STORE_SETTINGS)};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matchscope_backup.json';a.click();URL.revokeObjectURL(a.href)}
async function importJsonFile(file){const text=await file.text();const data=JSON.parse(text);const deckMap={};for(const d of(data.decks||[])){const old=d.id;d.id=nid('deck');d.createdAt=d.createdAt||now();d.updatedAt=now();deckMap[old]=d.id;await put(STORE_DECKS,d)}for(const m of(data.matchups||[])){m.id=nid('matchup');m.deckId=deckMap[m.deckId]||m.deckId;m.updatedAt=now();await put(STORE_MATCHUPS,m)}if(data.settings&&data.settings[0]&&Array.isArray(data.settings[0].turnCategories)){const merged=[...new Set([...(S.settings.turnCategories||DEFAULT_TURNS),...data.settings[0].turnCategories])];await put(STORE_SETTINGS,{id:'app',turnCategories:merged,updatedAt:now()})}await load();toast('JSONを読み込みました。')}async function deleteAllData(){if(!confirm('全データを削除します。よろしいですか？'))return;await clearStore(STORE_DECKS);await clearStore(STORE_MATCHUPS);await clearStore(STORE_SETTINGS);S.deckId='';S.matchupId='';await seed();await load();toast('全削除後、初期データを再作成しました。')}
async function showInfo(){const decks=await all(STORE_DECKS),matchups=await all(STORE_MATCHUPS),settings=await all(STORE_SETTINGS);const mi=matchups.reduce((a,m)=>a+normImages(m.images,true).length,0);const ri=decks.reduce((a,d)=>a+normImages(d.referenceImages,false).length,0);const mb=(new Blob([JSON.stringify({decks,matchups,settings})]).size/1024/1024).toFixed(2);E.infoBody.innerHTML='<div class="box"><div class="meta">'+meta('デッキ数',decks.length)+meta('対面数',matchups.length)+meta('対面画像数',mi)+meta('参考画像数',ri)+meta('概算容量 MB',mb)+'</div></div>';E.infoModal.classList.add('open');E.infoModal.setAttribute('aria-hidden','false')}function closeInfo(){E.infoModal.classList.remove('open');E.infoModal.setAttribute('aria-hidden','true')}
function bind(){E.modeBtn.onclick=()=>{S.edit=!S.edit;document.body.classList.toggle('edit',S.edit);E.modeLabel.textContent=S.edit?'編集モード':'閲覧モード';E.modeBtn.textContent=S.edit?'閲覧モードへ':'編集モードへ';render();renderDrawer();if(S.modal.id){const img=findImage(S.modal.kind,S.modal.id);if(img)renderModal(img,S.modal.kind)}};E.drawerBtn.onclick=openDrawer;E.closeDrawer.onclick=closeDrawer;E.overlay.onclick=closeDrawer;E.headerBtn.onclick=toggleHeader;E.headerBtn2.onclick=toggleHeader;E.deckPanelBtn.onclick=()=>{S.deckMin=!S.deckMin;E.deckPanel.classList.toggle('closed',S.deckMin);E.deckPanelBtn.textContent=S.deckMin?'デッキ選択を展開':'デッキ選択を最小化'};E.saveBtn.onclick=saveCurrent;E.infoBtn.onclick=showInfo;E.infoClose.onclick=closeInfo;E.infoModal.onclick=e=>{if(e.target===E.infoModal)closeInfo()};E.deckSelect.onchange=async()=>{S.deckId=E.deckSelect.value;S.matchupId='';await load()};E.matchupSelect.onchange=()=>{S.matchupId=E.matchupSelect.value;S.matchup=S.matchups.find(m=>m.id===S.matchupId)||null;render();renderDrawer()};E.quickSelect.onchange=render;E.modalClose.onclick=closeImageModal;E.imageModal.onclick=e=>{if(e.target===E.imageModal)closeImageModal()};E.jsonImportInput.onchange=()=>{const f=E.jsonImportInput.files[0];if(f)importJsonFile(f);E.jsonImportInput.value=''};document.onkeydown=e=>{if(e.key==='Escape'){if(S.modal.id)closeImageModal();else if(E.infoModal.classList.contains('open'))closeInfo();else if(S.drawer)closeDrawer()}}}
function openDrawer(){S.drawer=true;E.overlay.hidden=false;requestAnimationFrame(()=>{E.overlay.classList.add('open');E.drawer.classList.add('open')});renderDrawer()}function closeDrawer(){S.drawer=false;E.overlay.classList.remove('open');E.drawer.classList.remove('open');setTimeout(()=>{if(!S.drawer)E.overlay.hidden=true},180)}function toggleHeader(){S.headerMin=!S.headerMin;E.header.classList.toggle('min',S.headerMin);E.headerBtn.textContent=S.headerMin?'▾':'▴';E.headerBtn2.textContent=S.headerMin?'ヘッダーを展開':'ヘッダーを最小化'}function toast(msg){E.toast.textContent=msg;E.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>E.toast.classList.remove('show'),2300)}
async function init(){cache();bind();renderTabs();render();try{E.dbLabel.textContent='DB接続中';S.db=await openDb();await seed();await load();E.dbLabel.textContent='DB接続済'}catch(e){console.error(e);E.dbLabel.textContent='DBエラー';E.body.innerHTML='<div class="box"><h3>IndexedDBエラー</h3><p>'+escapeHtml(e.message)+'</p></div>'}}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
